<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光圣诞树 - 豪华版</title>
    <style>
        /* ================= 基础设置 ================= */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft YaHei', 'Songti SC', serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Great+Vibes&family=Monoton&family=Abril+Fatface&family=Ma+Shan+Zheng&display=swap');

        /* ================= UI 视觉系统 ================= */
        :root {
            --glass-bg: rgba(25, 20, 25, 0.65);
            --glass-border: rgba(255, 200, 200, 0.15);
            --accent-gold: #ff9ec6;  
            --panel-width: 240px; 
            --ui-scale: 0.95; 
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: auto; 
        }

        #left-sidebar { 
            position: absolute; top: 0; left: 0; width: var(--panel-width); height: 100vh; z-index: 20; display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(90deg, rgba(0,0,0,0.2), transparent);
        }

        .scroll-wrapper { flex: 1; overflow-y: auto; padding: 15px; scrollbar-width: none; display: flex; flex-direction: column; }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        .panel-hidden { transform: translateX(-100%); }

        .ui-title-main { font-family: 'SimSun', serif; font-size: 14px; font-weight: bold; color: #fff1c1; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; margin-bottom: 8px; letter-spacing: 2px; text-align: center; }
        .ui-title-sub { font-size: 11px; color: #ffccdd; margin-top: 8px; margin-bottom: 4px; font-weight: 700; }
        .control-row { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }

        .elegant-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 158, 198, 0.3); color: #ff9ec6; padding: 6px 0; cursor: pointer; font-size: 11px; transition: all 0.2s; width: 100%; border-radius: 4px; text-align: center; display: block; margin-bottom: 4px;
        }
        .elegant-btn:hover { background: rgba(255, 158, 198, 0.15); color: #fff; border-color: #fff; }
        .elegant-btn:active { transform: scale(0.98); }
        .elegant-btn input { display: none; } 

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; margin: 4px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 10px; width: 10px; border-radius: 50%; background: #ff9ec6; margin-top: -4px; cursor: pointer; }
        .input-glass { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 4px; width: 100%; box-sizing: border-box; font-size: 11px; border-radius: 2px; text-align: center; }
        
        .flex-row { display: flex; gap: 5px; }
        .particle-scroll-container { max-height: 120px; overflow-y: auto; padding-right: 5px; border-left: 2px solid rgba(255,255,255,0.05); padding-left: 8px; }

        #top-right-controls { position: absolute; top: 15px; right: 15px; z-index: 50; display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }
        
        .direction-pad { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; margin-top: 5px; }
        .dir-btn { background: rgba(255,255,255,0.05); color: #ff9ec6; text-align: center; padding: 5px; border-radius: 2px; cursor: pointer; font-size: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .dir-btn:hover { background: rgba(255,158,198,0.2); color: #fff; }

        #title-container { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); text-align: center; cursor: move; z-index: 40; pointer-events: auto; }
        .title-line { margin: 0; color: #fceea7; text-shadow: 0 0 20px rgba(255,200,200,0.3); white-space: nowrap; }

        #webcam-wrapper { position: absolute; bottom: 15px; right: 15px; width: 140px; height: 105px; border: 1px solid rgba(255,158,198,0.5); border-radius: 4px; overflow: hidden; z-index: 20; background: #000; transition: 0.3s; }
        #webcam-wrapper.camera-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; }
        #webcam-canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #cam-status { position: absolute; bottom: 4px; right: 4px; width: 6px; height: 6px; background: #300; border-radius: 50%; }
        #cam-status.active { background: #0f0; box-shadow: 0 0 5px #0f0; }

        #delete-manager { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #photo-grid { display: flex; flex-wrap: wrap; gap: 10px; width: 80%; height: 60%; overflow-y: auto; justify-content: center; padding: 20px; border: 1px solid #333; margin: 20px 0; border-radius: 8px; }
        .photo-item { width: 70px; height: 70px; position: relative; border: 1px solid #555; cursor: pointer; }
        .photo-item:hover { border-color: #ff9ec6; transform: scale(1.1); }
        .photo-thumb { width: 100%; height: 100%; object-fit: cover; }
        .delete-x { position: absolute; top: -6px; right: -6px; width: 16px; height: 16px; background: #c00; color: white; border-radius: 50%; text-align: center; line-height: 14px; font-size: 10px; border: 1px solid #fff; }
        .hidden { display: none !important; }

        #gesture-hint { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,158,198,0.6); font-size: 10px; pointer-events: none; text-shadow: 0 0 5px #000; z-index: 5; }
        #loading { position: absolute; inset: 0; background: #000; z-index: 200; display: flex; align-items: center; justify-content: center; color: #ff9ec6; letter-spacing: 3px; transition: opacity 0.5s; }
        .cam-note { font-size: 9px; color: #aaa; text-align: center; margin-top: 8px; }
    </style>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/", "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/+esm" } }
    </script>
</head>
<body>

    <div id="loading">SYSTEM LOADING...</div>

    <div id="canvas-container"></div>

    <div id="title-container">
        <h1 id="display-line1" class="title-line">Merry</h1>
        <h1 id="display-line2" class="title-line">Christmas</h1>
    </div>

    <div id="top-right-controls">
        <button class="elegant-btn glass-panel" onclick="toggleFullScreen()" style="width: auto; padding: 6px 15px;">⛶ 全屏</button>
        <button class="elegant-btn glass-panel" onclick="toggleUI()" style="width: auto; padding: 6px 15px;">👁 隐藏界面</button>
    </div>

    <div id="left-sidebar">
        <div class="scroll-wrapper">
            
            <div class="glass-panel">
                <div class="ui-title-main">场景定制</div>
                <div class="ui-title-sub">祝福语录</div>
                <input type="text" id="input-line1" class="input-glass" placeholder="第一行" oninput="updateTextConfig()" style="margin-bottom:2px;">
                <input type="text" id="input-line2" class="input-glass" placeholder="第二行" oninput="updateTextConfig()">
                
                <div class="ui-title-sub">字体与颜色</div>
                <div class="flex-row">
                    <select id="font-select" class="input-glass" onchange="updateTextConfig()" style="flex:2;">
                        <option value="style1">书法韵味</option>
                        <option value="style2">古典衬线</option>
                        <option value="style3">优雅手写</option>
                        <option value="style4">艺术线条</option>
                        <option value="style5">复古重磅</option>
                    </select>
                    <input type="color" id="color-picker" value="#ff9ec6" oninput="updateTextConfig()" style="flex:1; height:24px; border:none; background:none;">
                </div>
                <input type="range" min="50" max="250" value="100" id="slider-fontsize" oninput="updateTextConfig()">

                <div class="ui-title-sub">背景音乐</div>
                <div class="flex-row">
                    <button class="elegant-btn" onclick="toggleMusicPlay()" id="play-btn">⏯</button>
                    <button class="elegant-btn" onclick="replayMusic()">⟲</button>
                </div>
                <input type="range" min="0" max="100" value="50" oninput="updateVolume(this.value)">
                
                <div class="ui-title-sub">粒子与氛围</div>
                <div class="particle-scroll-container">
                    <span class="ui-title-sub" style="font-size:9px; color:#aaa;">树密度</span>
                    <input type="range" min="500" max="3000" value="1500" id="slider-tree">
                    <span class="ui-title-sub" style="font-size:9px; color:#aaa;">尘埃量</span>
                    <input type="range" min="500" max="5000" value="2500" id="slider-dust" onchange="applyParticleSettings()">
                    <span class="ui-title-sub" style="font-size:9px; color:#aaa;">雪花量</span>
                    <input type="range" min="0" max="3000" step="100" value="1500" id="slider-snow-count" onchange="updateSnowSettings()">
                    <span class="ui-title-sub" style="font-size:9px; color:#aaa;">雪花大小</span>
                    <input type="range" min="0.05" max="0.4" step="0.01" value="0.12" id="slider-snow-size" onchange="updateSnowSettings()">
                    <span class="ui-title-sub" style="font-size:9px; color:#aaa;">下雪速度</span>
                    <input type="range" min="1.0" max="8.0" step="0.5" value="3.5" oninput="updateSnowSpeed(this.value)">
                </div>
                <button class="elegant-btn" style="margin-top:8px;" onclick="applyParticleSettings()">⚡ 刷新场景</button>
            </div>

            <div class="glass-panel">
                <div class="ui-title-main">交互控制</div>
                <div class="flex-row">
                    <button class="elegant-btn" onclick="setMode('TREE')">聚合(树)</button>
                    <button class="elegant-btn" onclick="setMode('SCATTER')">散开(云)</button>
                </div>
                <button class="elegant-btn" onclick="showNextPhoto()">★ 顺序展示照片(捏合)</button>
                
                <div class="ui-title-sub">旋转控制</div>
                <input type="range" min="0.1" max="5.0" step="0.1" value="1.4" oninput="updateRotationSpeed(this.value)">
                <div class="direction-pad">
                    <div></div><div class="dir-btn" onmousedown="startRotate('up')" onmouseup="stopRotate()">▲</div><div></div>
                    <div class="dir-btn" onmousedown="startRotate('left')" onmouseup="stopRotate()">◀</div>
                    <div class="dir-btn" onclick="resetRotation()">●</div>
                    <div class="dir-btn" onmousedown="startRotate('right')" onmouseup="stopRotate()">▶</div>
                    <div></div><div class="dir-btn" onmousedown="startRotate('down')" onmouseup="stopRotate()">▼</div><div></div>
                </div>
            </div>

            <div class="glass-panel">
                <div class="ui-title-main">资源库</div>
                <div style="font-size:9px; color:#888; text-align:center; margin-bottom:5px;">(支持双击背景上传)</div>
                
                <label class="elegant-btn"> + 上传照片 (无限) 
                    <input type="file" id="file-input" multiple accept="image/*"> 
                </label>
                
                <button class="elegant-btn" onclick="openDeleteManager()">▣ 管理已传照片</button>
                <label class="elegant-btn"> ♫ 上传音乐 
                    <input type="file" id="music-input" accept=".mp3,audio/mpeg"> 
                </label>
                <button class="elegant-btn" onclick="toggleCameraDisplay()">📷 摄像头开关</button>
                <div class="cam-note">※ 摄像头功能需 HTTPS 或 localhost 环境</div>
            </div>

        </div>
    </div>

    <div id="webcam-wrapper">
        <canvas id="webcam-canvas" width="320" height="240"></canvas>
        <div id="cam-status"></div>
    </div>
    <video id="webcam-video" autoplay playsinline muted style="display:none"></video>

    <div id="gesture-hint">系统初始化中... (捏合手势可顺序查看照片)</div>

    <div id="delete-manager" class="hidden">
        <div style="color:#ff9ec6; font-size:18px; margin-bottom:10px;">照片库管理</div>
        <div id="photo-grid"></div>
        <div class="flex-row" style="gap:20px;">
            <button class="elegant-btn" style="width:100px; border-color:#844; color:#eaa;" onclick="clearAllPhotos()">清空所有</button>
            <button class="elegant-btn" style="width:100px;" onclick="closeDeleteManager()">关闭</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'; 
        import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

        const DB_NAME = "GrandTreeDB_v18_MiddleLayer";
        let CONFIG = {
            colors: { bg: 0x050005, champagneGold: 0xffb7c5, deepGreen: 0x4a0e20, accentRed: 0xff1493 },
            particles: { count: 1500, dustCount: 2500, treeHeight: 24, treeRadius: 8 },
            snow: { count: 1500, range: 70, speed: 3.5, sizeBase: 0.12, sizeVar: 0.1 }, 
            camera: { z: 50 },
            interaction: { rotationSpeed: 1.4, grabRadius: 0.25 }
        };

        const STATE = { mode: 'TREE', focusTarget: null, focusType: 0, hand: { detected: false, x: 0, y: 0 }, rotation: { x: 0, y: 0 }, uiVisible: true, cameraVisible: true, currentPhotoIndex: -1, gestureLock: false };
        let manualRotateState = { x: 0, y: 0 };
        const FONT_STYLES = { 'style1': { font: "'Ma Shan Zheng', cursive", spacing: "4px", shadow: "2px 2px 8px rgba(180,50,50,0.8)", transform: "none" }, 'style2': { font: "'Cinzel', serif", spacing: "6px", shadow: "0 0 20px rgba(255,215,0,0.5)", transform: "none" }, 'style3': { font: "'Great Vibes', cursive", spacing: "1px", shadow: "0 0 15px rgba(255,200,255,0.7)", transform: "none" }, 'style4': { font: "'Monoton', cursive", spacing: "1px", shadow: "0 0 10px #fff", transform: "none" }, 'style5': { font: "'Abril Fatface', cursive", spacing: "0px", shadow: "0 5px 15px rgba(0,0,0,0.8)", transform: "none" } };

        let db;
        function initDB() { return new Promise(r=>{const q=indexedDB.open(DB_NAME,1);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('photos'))d.createObjectStore('photos',{keyPath:"id"});if(!d.objectStoreNames.contains('music'))d.createObjectStore('music',{keyPath:"id"})};q.onsuccess=e=>{db=e.target.result;r(db)};q.onerror=()=>r(null)});}
        function savePhotoToDB(b){if(!db)return null;const t=db.transaction('photos',"readwrite");const i=Date.now()+Math.random().toString();t.objectStore('photos').add({id:i,data:b});return i;}
        function loadPhotosFromDB(){if(!db)return Promise.resolve([]); return new Promise(r=>{db.transaction('photos',"readonly").objectStore('photos').getAll().onsuccess=e=>r(e.target.result)});}
        function deletePhotoFromDB(i){if(db)db.transaction('photos',"readwrite").objectStore('photos').delete(i);}
        function clearPhotosDB(){if(db)db.transaction('photos',"readwrite").objectStore('photos').clear();}
        function saveMusicToDB(b){if(!db)return;const t=db.transaction('music',"readwrite");t.objectStore('music').put({id:'bgm',data:b});}
        function loadMusicFromDB(){if(!db)return Promise.resolve(null);return new Promise(r=>{db.transaction('music',"readonly").objectStore('music').get('bgm').onsuccess=e=>r(e.target.result?e.target.result.data:null)});}

        let scene, camera, renderer, composer, mainGroup, particleSystem=[], photoMeshGroup=new THREE.Group(), snowInstancedMesh, snowDummy=new THREE.Object3D(), snowData=[], clock=new THREE.Clock(), handLandmarker, videoElement, caneTexture, bgmAudio=new Audio(); bgmAudio.loop=true; let isMusicPlaying=false;
        
        let auroraUniforms;

        async function init() {
            initThree(); 
            createAurora();
            setupEnvironment(); setupLights(); createTextures(); createParticles(); createDust(); createSnow(); createDefaultPhotos(); setupPostProcessing(); setupEvents(); animate();
            
            try {
                await initDB();
                loadTextConfig();
                const ps=await loadPhotosFromDB(); 
                if(ps?.length>0){ 
                    photoMeshGroup.clear(); 
                    particleSystem=particleSystem.filter(p=>p.type!=='PHOTO'); 
                    ps.forEach(i=>createPhotoTexture(i.data, i.id)); 
                } 
                const ms=await loadMusicFromDB(); 
                if(ms){ bgmAudio.src=URL.createObjectURL(ms); updatePlayBtnUI(false); } 
            } catch(e){console.warn(e);}

            document.getElementById('loading').style.opacity = 0;
            setTimeout(() => document.getElementById('loading').remove(), 500);
            
            initMediaPipe(); 
            initDraggableTitle();
            setMode('TREE');
        }

        window.setupEvents = () => {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
                if(auroraUniforms) auroraUniforms.resolution.value.set(window.innerWidth, window.innerHeight);
            });
            document.body.addEventListener('dblclick', (e) => {
                if(e.target.closest('.glass-panel') || e.target.closest('button') || e.target.closest('input')) return;
                document.getElementById('file-input').click();
            });
            document.getElementById('file-input').addEventListener('change', e => {
                Array.from(e.target.files).forEach(f => {
                    const r = new FileReader();
                    r.onload = ev => {
                        const id = savePhotoToDB(ev.target.result);
                        createPhotoTexture(ev.target.result, id);
                    };
                    r.readAsDataURL(f);
                });
            });
            document.getElementById('music-input').addEventListener('change', e => {
                const f = e.target.files[0];
                if(f) {
                    saveMusicToDB(f);
                    bgmAudio.src = URL.createObjectURL(f);
                    bgmAudio.play().then(() => { isMusicPlaying = true; updatePlayBtnUI(true); }).catch(console.error);
                }
            });
            window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'h') window.toggleUI(); });
        }

        function processGestures(r){
            if(r.landmarks && r.landmarks.length > 0){
                STATE.hand.detected = true;
                const lm = r.landmarks[0];
                STATE.hand.x = (lm[9].x - 0.5) * 2;
                STATE.hand.y = (lm[9].y - 0.5) * 2;
                
                const thumb = lm[4], index = lm[8], wrist = lm[0], middle = lm[12];
                const pd = Math.hypot(thumb.x - index.x, thumb.y - index.y); 
                const od = Math.hypot(middle.x - wrist.x, middle.y - wrist.y); 
                
                const PINCH_THRESHOLD = 0.25;  
                const FIST_THRESHOLD = 0.22;   
                const OPEN_THRESHOLD = 0.32;   

                if (od < FIST_THRESHOLD) {
                    if (STATE.mode !== 'TREE') setMode('TREE');
                } else if (pd < PINCH_THRESHOLD) {
                    if (!STATE.gestureLock) {
                        showNextPhoto();
                    }
                } else if (od > OPEN_THRESHOLD) {
                    if (STATE.mode !== 'SCATTER') setMode('SCATTER');
                }
            } else {
                STATE.hand.detected = false;
            }
        }
        
        function initDraggableTitle() { const t=document.getElementById('title-container'); let d=false,o={x:0,y:0}; t.onmousedown=e=>{d=true;const r=t.getBoundingClientRect();o.x=e.clientX-r.left;o.y=e.clientY-r.top;t.style.transform='none';t.style.left=r.left+'px';t.style.top=r.top+'px'}; window.onmousemove=e=>{if(d){t.style.left=(e.clientX-o.x)+'px';t.style.top=(e.clientY-o.y)+'px'}}; window.onmouseup=()=>d=false; }
        window.toggleUI=()=> { STATE.uiVisible=!STATE.uiVisible; document.getElementById('left-sidebar').classList.toggle('panel-hidden', !STATE.uiVisible); };
        window.toggleCameraDisplay=()=> { STATE.cameraVisible=!STATE.cameraVisible; document.getElementById('webcam-wrapper').classList.toggle('camera-hidden', !STATE.cameraVisible); };
        window.toggleFullScreen=()=> { if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen(); };
        
        function loadTextConfig() { const s=JSON.parse(localStorage.getItem('v18_text_config')); if(s){ document.getElementById('input-line1').value=s.line1||""; document.getElementById('input-line2').value=s.line2||""; document.getElementById('font-select').value=s.fontKey||"style1"; document.getElementById('slider-fontsize').value=s.size||100; document.getElementById('color-picker').value=s.color||"#ff9ec6"; applyTextConfig(s.fontKey,s.line1,s.line2,s.size,s.color); } else { document.getElementById('input-line1').value="Merry"; document.getElementById('input-line2').value="Christmas"; applyTextConfig("style1","Merry","Christmas",100,"#ff9ec6"); } }
        window.updateTextConfig=()=> { const k=document.getElementById('font-select').value, l1=document.getElementById('input-line1').value, l2=document.getElementById('input-line2').value, s=document.getElementById('slider-fontsize').value, c=document.getElementById('color-picker').value; localStorage.setItem('v18_text_config',JSON.stringify({fontKey:k,line1:l1,line2:l2,size:s,color:c})); applyTextConfig(k,l1,l2,s,c); };
        function applyTextConfig(k,l1,l2,s,c) { const st=FONT_STYLES[k]||FONT_STYLES['style1']; const t1=document.getElementById('display-line1'), t2=document.getElementById('display-line2'), ct=document.getElementById('title-container'); ct.style.fontFamily=st.font; t1.innerText=l1; t2.innerText=l2; t1.style.letterSpacing=st.spacing; t2.style.letterSpacing=st.spacing; t1.style.textShadow=st.shadow; t2.style.textShadow=st.shadow; t1.style.textTransform=st.transform; t2.style.textTransform=st.transform; t1.style.color=c; t2.style.color=c; t1.style.fontSize=(0.48*s)+"px"; t2.style.fontSize=(0.48*s)+"px"; }
        
        window.toggleMusicPlay=()=> { if(!bgmAudio.src) return alert("请先上传音乐"); if(isMusicPlaying){ bgmAudio.pause(); isMusicPlaying=false; } else { bgmAudio.play(); isMusicPlaying=true; } updatePlayBtnUI(isMusicPlaying); };
        window.replayMusic=()=> { if(!bgmAudio.src) return; bgmAudio.currentTime=0; bgmAudio.play(); isMusicPlaying=true; updatePlayBtnUI(true); };
        window.updateVolume=(v)=> { bgmAudio.volume=v/100; };
        function updatePlayBtnUI(p) { document.getElementById('play-btn').innerText = p ? "⏸" : "⏯"; }

        window.updateRotationSpeed=(v)=> { CONFIG.interaction.rotationSpeed = parseFloat(v); };
        window.setMode = function(mode) { STATE.mode = mode; STATE.focusTarget = null; const hint = document.getElementById('gesture-hint'); if(mode === 'TREE') hint.innerText = "状态: 聚合 (圣诞树) - 捏合手势可查看照片"; else if(mode === 'SCATTER') hint.innerText = "状态: 散开 (星云)"; else if(mode === 'FOCUS') hint.innerText = "状态: 照片展示中 (再次捏合切换下一张)"; }

        window.showNextPhoto = () => {
            if (STATE.gestureLock) return; 
            const photos = particleSystem.filter(p => p.type === 'PHOTO');
            if (photos.length === 0) return;
            STATE.gestureLock = true;
            setTimeout(() => { STATE.gestureLock = false; }, 1200);
            STATE.currentPhotoIndex = (STATE.currentPhotoIndex + 1) % photos.length;
            const targetPhoto = photos[STATE.currentPhotoIndex];
            if(targetPhoto){
                setMode('FOCUS');
                STATE.focusTarget = targetPhoto.mesh;
                STATE.focusType = 0; 
            }
        };

        window.triggerPhotoGrab=()=> { let cp=null,md=Infinity; STATE.focusType=Math.floor(Math.random()*4); particleSystem.filter(p=>p.type==='PHOTO').forEach(p=>{ p.mesh.updateMatrixWorld(); const pos=new THREE.Vector3(); p.mesh.getWorldPosition(pos); const sp=pos.project(camera); const d=Math.hypot(sp.x,sp.y); if(sp.z<1 && d<CONFIG.interaction.grabRadius){ if(d<md){md=d;cp=p.mesh;} } }); if(cp){ setMode('FOCUS'); STATE.focusTarget=cp; } else { setMode('SCATTER'); } };
        window.startRotate=(d)=> { if(d==='up')manualRotateState.x=-1; if(d==='down')manualRotateState.x=1; if(d==='left')manualRotateState.y=-1; if(d==='right')manualRotateState.y=1; };
        window.stopRotate=()=> { manualRotateState={x:0,y:0}; };
        window.resetRotation=()=> { STATE.rotation={x:0,y:0}; if(STATE.mode!=='TREE')setMode('TREE'); };

        function initThree() { const c=document.getElementById('canvas-container'); scene=new THREE.Scene(); scene.background=new THREE.Color(CONFIG.colors.bg); scene.fog=new THREE.FogExp2(CONFIG.colors.bg,0.01); camera=new THREE.PerspectiveCamera(42,window.innerWidth/window.innerHeight,0.1,1000); camera.position.set(0,2,CONFIG.camera.z); renderer=new THREE.WebGLRenderer({antialias:true,alpha:false,powerPreference:"high-performance"}); renderer.setSize(window.innerWidth,window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); renderer.toneMapping=THREE.ReinhardToneMapping; renderer.toneMappingExposure=2.2; c.appendChild(renderer.domElement); mainGroup=new THREE.Group(); scene.add(mainGroup); }
        function setupEnvironment() { const p=new THREE.PMREMGenerator(renderer); scene.environment=p.fromScene(new RoomEnvironment(),0.04).texture; }
        function setupLights() { scene.add(new THREE.AmbientLight(0xffffff,0.6)); const i=new THREE.PointLight(0xffaa00,2,20); i.position.set(0,5,0); mainGroup.add(i); const s1=new THREE.SpotLight(0xffcc66,1200); s1.position.set(30,40,40); s1.angle=0.5; s1.penumbra=0.5; scene.add(s1); const s2=new THREE.SpotLight(0x6688ff,600); s2.position.set(-30,20,-30); scene.add(s2); const f=new THREE.DirectionalLight(0xffeebb,0.8); f.position.set(0,0,50); scene.add(f); }
        function setupPostProcessing() { const r=new RenderPass(scene,camera); const b=new UnrealBloomPass(new THREE.Vector2(window.innerWidth,window.innerHeight),1.5,0.4,0.85); b.threshold=0.7; b.strength=0.45; b.radius=0.4; composer=new EffectComposer(renderer); composer.addPass(r); composer.addPass(b); }
        function createTextures() { const c=document.createElement('canvas'); c.width=128; c.height=128; const x=c.getContext('2d'); x.fillStyle='#ffffff'; x.fillRect(0,0,128,128); x.fillStyle='#880000'; x.beginPath(); for(let i=-128;i<256;i+=32){x.moveTo(i,0);x.lineTo(i+32,128);x.lineTo(i+16,128);x.lineTo(i-16,0);} x.fill(); caneTexture=new THREE.CanvasTexture(c); caneTexture.wrapS=caneTexture.wrapT=THREE.RepeatWrapping; caneTexture.repeat.set(3,3); }

        function createAurora() {
            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `;
            const fragmentShader = `
                uniform float uTime;
                varying vec2 vUv;
                
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                    vec2 i  = floor(v + dot(v, C.yy) );
                    vec2 x0 = v -   i + dot(i, C.xx);
                    vec2 i1;
                    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                    m = m*m ;
                    m = m*m ;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g;
                    g.x  = a0.x  * x0.x  + h.x  * x0.y;
                    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }

                void main() {
                    vec2 uv = vUv;
                    float noise1 = snoise(vec2(uv.x * 2.0 + uTime * 0.1, uv.y * 0.5 - uTime * 0.2));
                    float noise2 = snoise(vec2(uv.x * 4.0 - uTime * 0.15, uv.y * 1.5 + uTime * 0.1));
                    
                    float combined = (noise1 + noise2) * 0.5;
                    float alpha = smoothstep(0.0, 0.8, 1.0 - abs(uv.y - 0.5) * 1.5);
                    
                    vec3 color1 = vec3(0.0, 1.0, 0.8);
                    vec3 color2 = vec3(0.6, 0.0, 1.0);
                    vec3 finalColor = mix(color1, color2, (uv.x + noise1) * 0.5 + 0.5);
                    
                    float brightness = smoothstep(0.3, 0.7, combined + 0.5) * alpha;
                    vec3 bg = vec3(0.02, 0.02, 0.05);
                    
                    gl_FragColor = vec4(bg + finalColor * brightness * 0.6, 1.0);
                }
            `;

            auroraUniforms = {
                uTime: { value: 0 },
                resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            };

            const geometry = new THREE.SphereGeometry(80, 64, 64);
            const material = new THREE.ShaderMaterial({
                uniforms: auroraUniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                side: THREE.BackSide,
                transparent: true
            });

            const auroraMesh = new THREE.Mesh(geometry, material);
            scene.add(auroraMesh);
        }

        window.updateSnowSettings=()=> {
            CONFIG.snow.count = parseInt(document.getElementById('slider-snow-count').value);
            CONFIG.snow.sizeBase = parseFloat(document.getElementById('slider-snow-size').value);
            createSnow();
        };
        window.updateSnowSpeed=(v)=> { CONFIG.snow.speed = parseFloat(v); };
        function createSnow() {
            if(snowInstancedMesh){scene.remove(snowInstancedMesh); snowInstancedMesh.geometry.dispose(); snowInstancedMesh.material.dispose(); snowInstancedMesh=null; snowData=[];}
            if(CONFIG.snow.count<=0)return;
            const g=new THREE.IcosahedronGeometry(CONFIG.snow.sizeBase,0);
            const m=new THREE.MeshPhysicalMaterial({color:0xffffff,metalness:0,roughness:0.15,transmission:0.9,thickness:0.5,envMapIntensity:1.5,clearcoat:1,clearcoatRoughness:0.1,ior:1.33});
            snowInstancedMesh=new THREE.InstancedMesh(g,m,CONFIG.snow.count);
            snowInstancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            for(let i=0;i<CONFIG.snow.count;i++){
                snowDummy.position.set((Math.random()-0.5)*CONFIG.snow.range, Math.random()*CONFIG.snow.range, (Math.random()-0.5)*CONFIG.snow.range);
                snowDummy.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
                const s=0.5+Math.random()*CONFIG.snow.sizeVar; snowDummy.scale.set(s,s,s); snowDummy.updateMatrix();
                snowInstancedMesh.setMatrixAt(i,snowDummy.matrix);
                snowData.push({vy:(Math.random()*0.5+0.8), rx:(Math.random()-0.5)*2, ry:(Math.random()-0.5)*2, rz:(Math.random()-0.5)*2});
            } 
            scene.add(snowInstancedMesh);
        }

        class Particle {
            constructor(m,t,d=false){this.mesh=m;this.type=t;this.isDust=d;this.posTree=new THREE.Vector3();this.posScatter=new THREE.Vector3();this.baseScale=m.scale.x;this.photoId=null;const s=(t==='PHOTO')?0.3:2.0;this.spinSpeed=new THREE.Vector3((Math.random()-0.5)*s,(Math.random()-0.5)*s,(Math.random()-0.5)*s);this.calcPos();}
            
            calcPos(){
                if (this.type === 'PHOTO') {
                    const middleRange = 10; 
                    const yOffset = -5;
                    const tMid = Math.random(); 
                    const y = (tMid * middleRange) + yOffset; 
                    const hGlobal = CONFIG.particles.treeHeight; 
                    const tGlobal = (y + hGlobal / 2) / hGlobal;
                    const rm = Math.max(0.5, CONFIG.particles.treeRadius * (1.0 - tGlobal));
                    const a = Math.random() * Math.PI * 2; 
                    const r = rm * 1.08;
                    this.posTree.set(Math.cos(a) * r, y, Math.sin(a) * r);
                } else {
                    const h=CONFIG.particles.treeHeight;
                    let t=Math.pow(Math.random(),0.8);
                    const y=(t*h)-(h/2);
                    let rm=Math.max(0.5,CONFIG.particles.treeRadius*(1.0-t));
                    const a=t*50*Math.PI+Math.random()*Math.PI;
                    const r=rm*(0.8+Math.random()*0.4);
                    this.posTree.set(Math.cos(a)*r,y,Math.sin(a)*r);
                }
                let rs=this.isDust?(12+Math.random()*20):(8+Math.random()*12);
                const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
                this.posScatter.set(rs*Math.sin(ph)*Math.cos(th),rs*Math.sin(ph)*Math.sin(th),rs*Math.cos(ph));
            }

            update(dt,mode,ft){
                let tg=this.posTree; if(mode==='SCATTER')tg=this.posScatter; else if(mode==='FOCUS'){if(this.mesh===ft){let off=new THREE.Vector3(0,1,38);if(STATE.focusType===1)off.set(-4,2,35);else if(STATE.focusType===2)off.set(3,0,32);else if(STATE.focusType===3)off.set(0,-2.5,30);const im=new THREE.Matrix4().copy(mainGroup.matrixWorld).invert();tg=off.applyMatrix4(im);}else tg=this.posScatter;}
                const ls=(mode==='FOCUS'&&this.mesh===ft)?8.0:4.0; this.mesh.position.lerp(tg,ls*dt);
                if(mode==='SCATTER'){this.mesh.rotation.x+=this.spinSpeed.x*dt;this.mesh.rotation.y+=this.spinSpeed.y*dt;this.mesh.rotation.z+=this.spinSpeed.z*dt;}else if(mode==='TREE'){this.mesh.rotation.x=THREE.MathUtils.lerp(this.mesh.rotation.x,0,dt);this.mesh.rotation.z=THREE.MathUtils.lerp(this.mesh.rotation.z,0,dt);this.mesh.rotation.y+=0.5*dt;}
                if(mode==='FOCUS'&&this.mesh===ft){this.mesh.lookAt(camera.position);if(STATE.focusType===1)this.mesh.rotateZ(0.38);if(STATE.focusType===2)this.mesh.rotateZ(-0.15);if(STATE.focusType===3)this.mesh.rotateX(-0.4);}
                let s=this.baseScale;if(this.isDust){s=this.baseScale*(0.8+0.4*Math.sin(clock.elapsedTime*4+this.mesh.id));if(mode==='TREE')s=0;}else if(mode==='SCATTER'&&this.type==='PHOTO')s=this.baseScale*2.5;else if(mode==='FOCUS'){if(this.mesh===ft){if(STATE.focusType===2)s=3.5;else if(STATE.focusType===3)s=4.8;else s=3.0;}else s=this.baseScale*0.8;}this.mesh.scale.lerp(new THREE.Vector3(s,s,s),6*dt);
            }
        }

        function createParticles() {
            const sg=new THREE.SphereGeometry(0.5,32,32); const bg=new THREE.BoxGeometry(0.55,0.55,0.55); const c=new THREE.CatmullRomCurve3([new THREE.Vector3(0,-0.5,0),new THREE.Vector3(0,0.3,0),new THREE.Vector3(0.1,0.5,0),new THREE.Vector3(0.3,0.4,0)]); const cg=new THREE.TubeGeometry(c,16,0.08,8,false);
            const gm=new THREE.MeshStandardMaterial({color:CONFIG.colors.champagneGold,metalness:1,roughness:0.1,envMapIntensity:2,emissive:0x443300,emissiveIntensity:0.3});
            const grm=new THREE.MeshStandardMaterial({color:CONFIG.colors.deepGreen,metalness:0.2,roughness:0.8,emissive:0x002200,emissiveIntensity:0.2});
            const rm=new THREE.MeshPhysicalMaterial({color:CONFIG.colors.accentRed,metalness:0.3,roughness:0.2,clearcoat:1,emissive:0x330000});
            const cm=new THREE.MeshStandardMaterial({map:caneTexture,roughness:0.4});
            for(let i=0;i<CONFIG.particles.count;i++){const r=Math.random();let m,t;if(r<0.4){m=new THREE.Mesh(bg,grm);t='BOX';}else if(r<0.7){m=new THREE.Mesh(bg,gm);t='GOLD_BOX';}else if(r<0.92){m=new THREE.Mesh(sg,gm);t='GOLD_SPHERE';}else if(r<0.97){m=new THREE.Mesh(sg,rm);t='RED';}else{m=new THREE.Mesh(cg,cm);t='CANE';}const s=0.4+Math.random()*0.5;m.scale.set(s,s,s);m.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);mainGroup.add(m);particleSystem.push(new Particle(m,t,false));}
            const st=new THREE.Mesh(new THREE.OctahedronGeometry(1.2,0),new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0xffaa00,emissiveIntensity:1,metalness:1,roughness:0}));st.position.set(0,CONFIG.particles.treeHeight/2+1.2,0);mainGroup.add(st);mainGroup.add(photoMeshGroup);
        }
        function createDust(){const g=new THREE.TetrahedronGeometry(0.08,0);const m=new THREE.MeshBasicMaterial({color:0xffeebb,transparent:true,opacity:0.8});for(let i=0;i<CONFIG.particles.dustCount;i++){const ms=new THREE.Mesh(g,m);ms.scale.setScalar(0.5+Math.random());mainGroup.add(ms);particleSystem.push(new Particle(ms,'DUST',true));}}
        function createDefaultPhotos(){const c=document.createElement('canvas');c.width=512;c.height=512;const x=c.getContext('2d');x.fillStyle='#050505';x.fillRect(0,0,512,512);x.strokeStyle='#eebb66';x.lineWidth=15;x.strokeRect(20,20,472,472);x.font='500 60px Times New Roman';x.fillStyle='#eebb66';x.textAlign='center';x.fillText("JOYEUX",256,230);x.fillText("NOEL",256,300);createPhotoTexture(c.toDataURL(),'default');}
        function createPhotoTexture(b,id){const i=new Image();i.src=b;i.onload=()=>{const t=new THREE.Texture(i);t.colorSpace=THREE.SRGBColorSpace;t.needsUpdate=true;addPhotoToScene(t,id,i);}}
        function addPhotoToScene(t,id,imgObj){
            const aspect=imgObj.width/imgObj.height; let w=1.2,h=1.2; if(aspect>1)h=w/aspect; else w=h*aspect;
            const fg=new THREE.BoxGeometry(w+0.2,h+0.2,0.05); const fm=new THREE.MeshStandardMaterial({color:0xffb7c5,metalness:0.6,roughness:0.5,envMapIntensity:0.5}); const f=new THREE.Mesh(fg,fm); const pg=new THREE.PlaneGeometry(w,h); const pm=new THREE.MeshBasicMaterial({map:t}); const p=new THREE.Mesh(pg,pm); p.position.z=0.04; const g=new THREE.Group(); g.add(f); g.add(p); const s=0.8; g.scale.set(s,s,s); photoMeshGroup.add(g); const pt=new Particle(g,'PHOTO',false); pt.photoId=id; pt.texture=t; particleSystem.push(pt);
        }
        window.applyParticleSettings=()=>{
            const ph=particleSystem.filter(p=>p.type==='PHOTO');
            const tr=[];
            mainGroup.children.forEach(c=>{if(c!==photoMeshGroup) tr.push(c)});
            tr.forEach(c=>mainGroup.remove(c));
            particleSystem = [...ph];
            CONFIG.particles.count = parseInt(document.getElementById('slider-tree').value);
            CONFIG.particles.dustCount = parseInt(document.getElementById('slider-dust').value);
            createParticles();
            createDust();
            createSnow();
        };

        async function initMediaPipe(){videoElement=document.getElementById('webcam-video');if(navigator.mediaDevices?.getUserMedia){try{const s=await navigator.mediaDevices.getUserMedia({video:true});videoElement.srcObject=s;videoElement.onloadedmetadata=()=>{videoElement.play();renderWebcamPreview()};}catch(e){console.warn(e)}}try{const v=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");handLandmarker=await HandLandmarker.createFromOptions(v,{baseOptions:{modelAssetPath:`https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,delegate:"GPU"},runningMode:"VIDEO",numHands:1});predictWebcam();}catch(e){console.warn(e)}}
        function renderWebcamPreview(){const c=document.getElementById('webcam-canvas'),x=c.getContext('2d',{willReadFrequently:true});function d(){if(videoElement.readyState>=2)x.drawImage(videoElement,0,0,c.width,c.height);requestAnimationFrame(d)}d()}
        let lvt=-1;async function predictWebcam(){if(videoElement&&videoElement.currentTime!==lvt&&handLandmarker){lvt=videoElement.currentTime;const r=handLandmarker.detectForVideo(videoElement,performance.now());processGestures(r);document.getElementById('cam-status').classList.toggle('active',r.landmarks.length>0);}requestAnimationFrame(predictWebcam);}

        window.openDeleteManager=async()=>{document.getElementById('delete-manager').classList.remove('hidden');const g=document.getElementById('photo-grid');g.innerHTML='';const ps=await loadPhotosFromDB();if(!ps||ps.length===0)g.innerHTML='<div style="color:#888;">暂无照片</div>';else ps.forEach(p=>{const d=document.createElement('div');d.className='photo-item';const i=document.createElement('img');i.className='photo-thumb';i.src=p.data;const b=document.createElement('div');b.className='delete-x';b.innerText='X';b.onclick=e=>{e.stopPropagation();confirmDelete(p.id,d)};d.appendChild(i);d.appendChild(b);g.appendChild(d)})}
        window.confirmDelete=(id,el)=>{deletePhotoFromDB(id);el.remove();const p=particleSystem.find(pa=>pa.photoId===id);if(p){photoMeshGroup.remove(p.mesh);particleSystem.splice(particleSystem.indexOf(p),1)}}
        window.clearAllPhotos=()=>{if(confirm("确定要清空所有照片吗？")){clearPhotosDB();particleSystem.filter(p=>p.type==='PHOTO').forEach(p=>photoMeshGroup.remove(p.mesh));particleSystem=particleSystem.filter(p=>p.type!=='PHOTO');window.openDeleteManager()}}
        window.closeDeleteManager=()=>{document.getElementById('delete-manager').classList.add('hidden')}

        function animate() {
            requestAnimationFrame(animate); const dt=clock.getDelta(); const et=clock.getElapsedTime();
            
            if (auroraUniforms) auroraUniforms.uTime.value = et;

            if(snowInstancedMesh&&STATE.mode==='TREE'){
                snowInstancedMesh.visible=true;
                for(let i=0;i<CONFIG.snow.count;i++){
                    snowInstancedMesh.getMatrixAt(i,snowDummy.matrix);snowDummy.matrix.decompose(snowDummy.position,snowDummy.quaternion,snowDummy.scale);const d=snowData[i];
                    snowDummy.position.y-=d.vy*CONFIG.snow.speed*dt;snowDummy.position.x+=Math.sin(et*0.5+i)*2.5*dt;snowDummy.position.z+=Math.cos(et*0.3+i)*1.5*dt;
                    snowDummy.rotation.x+=d.rx*dt;snowDummy.rotation.y+=d.ry*dt;snowDummy.rotation.z+=d.rz*dt;
                    if(snowDummy.position.y<-25){snowDummy.position.y=40;snowDummy.position.x=(Math.random()-0.5)*CONFIG.snow.range;snowDummy.position.z=(Math.random()-0.5)*CONFIG.snow.range;}
                    snowDummy.updateMatrix();snowInstancedMesh.setMatrixAt(i,snowDummy.matrix);
                } snowInstancedMesh.instanceMatrix.needsUpdate=true;
            } else if(snowInstancedMesh)snowInstancedMesh.visible=false;

            if(manualRotateState.x!==0||manualRotateState.y!==0){const s=CONFIG.interaction.rotationSpeed*2.0;STATE.rotation.x+=manualRotateState.x*s*dt;STATE.rotation.y+=manualRotateState.y*s*dt;}
            else if(STATE.mode==='SCATTER'&&STATE.hand.detected){const th=0.3,s=CONFIG.interaction.rotationSpeed;if(STATE.hand.x>th)STATE.rotation.y-=s*dt*(STATE.hand.x-th);else if(STATE.hand.x<-th)STATE.rotation.y-=s*dt*(STATE.hand.x+th);if(STATE.hand.y<-th)STATE.rotation.x+=s*dt*(-STATE.hand.y-th);else if(STATE.hand.y>th)STATE.rotation.x-=s*dt*(STATE.hand.y-th);}
            else{if(STATE.mode==='TREE'){STATE.rotation.y+=0.3*dt;STATE.rotation.x+=(0-STATE.rotation.x)*2.0*dt;}else STATE.rotation.y+=0.1*dt;}
            
            mainGroup.rotation.y=STATE.rotation.y;mainGroup.rotation.x=STATE.rotation.x;
            particleSystem.forEach(p=>p.update(dt,STATE.mode,STATE.focusTarget));
            composer.render();
        }
        init();
    </script>
